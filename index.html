<!doctype html>
<html lang="en">
  <head>
    <title>My Life in Weeks</title>
    <style>
        body {
            font-family:sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
    <script>
        function drawLifeInWeeks() {
            const weeksInYear = 52;
            const totalWeeks = 4000; // based on "Four Thousand Weeks: Time Management for Mortals" by Oliver Burkeman"
            const currentWeek = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 1)) / (7 * 24 * 60 * 60 * 1000)) + (new Date().getFullYear() - 1996) * weeksInYear;

            const container = document.createElement("div");
            container.style.display = "grid";
            container.style.gridTemplateColumns = "repeat(52, 1.8vw)";
            container.style.gridGap = "1px";

            for (let i = 0; i < totalWeeks; i++) {
                if(i < currentWeek) {
                    const weekDiv = document.createElement('div');
                    weekDiv.style.width = '1.8vw';
                    weekDiv.style.height = '1.8vw';
                    weekDiv.style.backgroundColor = '#0077ff'; 
                    container.appendChild(weekDiv);
                } else {
                    const weekDiv = document.createElement('div');
                    weekDiv.style.width = '1.8vw';
                    weekDiv.style.height = '1.8vw';
                    weekDiv.style.backgroundColor = '#f5f5f5'; 
                    container.appendChild(weekDiv);
            }
        }
            document.body.appendChild(container);
        }
    </script>
  </head>
  <body onload="drawLifeInWeeks()">
    <h1>My Life in Weeks</h1>
  </body>
</html>
